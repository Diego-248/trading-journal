<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Trading Plan & Journal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--panel-2); border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; font-weight: 700; color: var(--accent);
    margin: 0 auto 14px;
  }
  .profile-name { text-align: center; font-size: 1.3rem; font-weight: 700; }
  .profile-since { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .stat-box { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .stat-box .num { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stat-box .lbl { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
</style>
</head>
<body>
  <nav class="navbar">
    <div class="brand">Trading<span>Plan</span> &amp; Journal</div>
    <div class="nav-links">
      <a href="index.html">Plan</a>
      <a href="journal.html">Journal</a>
      <a href="history.html">History</a>
      <a href="profile.html" class="active">Profile</a>
      <span id="navUsername" style="color:var(--muted); font-size:0.85rem;"></span>
      <button id="logoutBtn" class="btn-secondary">Log Out</button>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="profile-name" id="profileUsername">—</div>
      <div class="profile-since" id="profileSince">—</div>

      <div class="stat-grid">
        <div class="stat-box">
          <div class="num" id="statTotal">0</div>
          <div class="lbl">Total Trades</div>
        </div>
        <div class="stat-box">
          <div class="num" id="statFollowed">0%</div>
          <div class="lbl">Followed Plan</div>
        </div>
        <div class="stat-box">
          <div class="num" id="statWins">0</div>
          <div class="lbl">Wins</div>
        </div>
        <div class="stat-box">
          <div class="num" id="statLosses">0</div>
          <div class="lbl">Losses</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Account</h2>
      <p style="color:var(--muted)">More profile settings (password change, avatar upload, etc.) coming in a future update.</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Trading Plan & Journal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14110b">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Trading Plan &amp; Journal</h1>
      <p class="subtitle">Log in to access your trading plan and journal</p>

      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">

        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">

        <button type="submit" class="btn-primary">Log In</button>
      </form>

      <div class="error-msg" id="errorMsg"></div>

      <p class="switch-link">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorMsg.textContent = data.error || 'Login failed.';
          errorMsg.style.display = 'block';
          return;
        }
        window.location.href = 'index.html';
      } catch (err) {
        errorMsg.textContent = 'Could not reach the server.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>

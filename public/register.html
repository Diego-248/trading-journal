<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — My Trading Plan and Journal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14110b">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2955611696261162" crossorigin="anonymous"></script>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="subtitle">Set up your trading journal account</p>

      <form id="registerForm">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">

        <label for="password">Create password</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password">

        <button type="submit" class="btn-primary">Sign Up</button>
      </form>

      <div class="error-msg" id="errorMsg"></div>
      <p class="switch-link">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorMsg.textContent = data.error || 'Registration failed.';
          errorMsg.style.display = 'block';
          return;
        }
        // New accounts go straight to email verification before anything else
        if (!data.emailSent && data.devCode) {
          sessionStorage.setItem('devVerifyCode', data.devCode);
        }
        window.location.href = 'verify.html';
      } catch (err) {
        errorMsg.textContent = 'Could not reach the server.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>

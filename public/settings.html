<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — My Trading Plan and Journal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14110b">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .settings-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
  .settings-item:last-child { border-bottom: none; }
  .settings-item .label { font-weight: 600; }
  .settings-item .desc { color: var(--muted); font-size: 0.85rem; margin-top: 2px; margin-bottom: 10px; }
  .inline-msg { font-size: 0.85rem; margin-top: 8px; display: none; }
  .inline-msg.success { color: var(--accent); }
  .inline-msg.error { color: var(--danger); }
  .verified-tag { color: var(--accent); font-size: 0.8rem; font-weight: 600; }
  .unverified-tag { color: var(--danger); font-size: 0.8rem; font-weight: 600; }
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2955611696261162" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="navbar">
    <div class="brand">My Trading<span>Plan and Journal</span></div>
  </nav>

  <div class="container">

    <div class="card">
      <h2>Account Information</h2>
      <div class="settings-item">
        <div class="label">Username</div>
        <div class="desc" id="infoUsername" style="margin-bottom:10px;">—</div>
        <div id="usernameEditWrap" style="display:none;">
          <input type="text" id="usernameInput" placeholder="Username">
          <button class="btn-primary" id="saveUsernameBtn">Save Username</button>
        </div>
        <button class="btn-secondary" id="updateUsernameBtn">Update Username</button>
        <p class="inline-msg" id="usernameMsg"></p>
      </div>
    </div>

    <div class="card">
      <h2>Email</h2>
      <div class="desc" id="infoEmail" style="margin-bottom:10px;">No email added yet</div>

      <div id="emailEditWrap">
        <label for="emailInput">Email address</label>
        <input type="email" id="emailInput" placeholder="you@example.com">
        <button class="btn-primary" id="saveEmailBtn">Save Email</button>
      </div>
      <button class="btn-secondary" id="updateEmailBtn" style="display:none;">Update Email</button>
      <p class="inline-msg" id="emailMsg"></p>
    </div>

    <div class="card" id="verifyCard" style="display:none;">
      <h2>Verify Email</h2>
      <p style="color:var(--muted); font-size:0.85rem;">Enter the code we sent to your email.</p>
      <p style="color:var(--accent); font-weight:700;" id="devCodeDisplay"></p>
      <label for="codeInput">Verification code</label>
      <input type="text" id="codeInput" placeholder="6-digit code">
      <button class="btn-primary" id="verifyBtn">Verify</button>
      <p class="inline-msg" id="verifyMsg"></p>
    </div>

    <div class="card">
      <h2>Date of Birth</h2>
      <div id="dobEditWrap">
        <input type="date" id="dobInput">
        <button class="btn-secondary" id="saveDobBtn" style="margin-top:10px;">Save</button>
      </div>
      <p class="desc" id="dobDisplay" style="display:none;"></p>
      <p class="inline-msg" id="dobMsg"></p>
    </div>

    <div class="card">
      <h2>Change Password</h2>
      <label for="currentPassword">Current password</label>
      <input type="password" id="currentPassword">
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" minlength="6">
      <button class="btn-primary" id="changePasswordBtn">Change Password</button>
      <p class="inline-msg" id="passwordMsg"></p>
    </div>

    <div class="card">
      <button id="logoutBtn" class="btn-primary" style="background:var(--danger); color:#fff;">Log Out</button>
    </div>

    <p style="text-align:center; color:var(--muted); font-size:0.7rem; margin-top:10px;" id="appVersion">—</p>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>

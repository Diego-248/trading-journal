<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor AI — My Trading Plan and Journal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14110b">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .chat-wrap {
    display: flex; flex-direction: column;
    height: calc(100vh - 140px);
    max-height: 720px;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 6px 0;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 0.92rem; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #14110b; }
  .msg.assistant { align-self: flex-start; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .chat-input-row { display: flex; gap: 8px; margin-top: 12px; }
  .chat-input-row textarea { flex: 1; resize: none; }
  .chat-input-row button { padding: 0 18px; }
  .typing { color: var(--muted); font-size: 0.85rem; font-style: italic; }
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2955611696261162" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="navbar">
    <div class="brand">My Trading<span>Plan and Journal</span></div>
  </nav>

  <div class="container">
    <div class="card">
      <h2>Mentor AI</h2>
      <p style="color:var(--muted); font-size:0.85rem;">
        Talk through a trade, a mistake, or anything on your mind about your trading. Your mentor is here to listen and help.
      </p>

      <div class="chat-wrap">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <textarea id="chatInput" rows="1" placeholder="Tell your mentor what happened..."></textarea>
          <button class="btn-primary" id="sendBtn" style="width:auto;">Send</button>
        </div>
      </div>
      <button class="btn-secondary" id="clearChatBtn" style="margin-top:14px;">Clear Conversation</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/mentor.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — My Trading Plan and Journal</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14110b">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="css/style.css">
<style>
  .inline-msg { font-size: 0.85rem; margin-top: 10px; display: none; }
  .inline-msg.success { color: var(--accent); }
  .inline-msg.error { color: var(--danger); }
</style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Verify Your Email</h1>
      <p class="subtitle">Required once, before you can use the app</p>

      <div class="card" style="background:var(--panel-2);">
        <p style="color:var(--muted); font-size:0.85rem;">We sent a 6-digit code to your email.</p>
        <p id="devCodeNote" style="color:var(--accent); font-weight:700; display:none;"></p>
        <label for="emailCode">Verification code</label>
        <input type="text" id="emailCode" placeholder="6-digit code">
        <button class="btn-primary" id="verifyEmailBtn">Verify Email</button>
        <p class="inline-msg" id="emailMsg"></p>
        <button class="btn-secondary" id="resendBtn" style="margin-top:14px;">Resend Code</button>
      </div>
    </div>
  </div>

  <script src="js/verify.js"></script>
</body>
</html>
